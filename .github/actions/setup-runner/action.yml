---
name: Set up Runner
# Schema: https://json.schemastore.org/github-action.json

inputs:
  os:
    type: string
    description: "The operating system of the runner"
    required: true
  gcc:
    type: string
    description: "The GCC version to use"
    required: true
  python-version:
    type: string
    description: "The python version to use"
    required: true

runs:
  using: 'composite'
  steps:
    # ------------------------------ Ubuntu ------------------------------
    - if: ${{ startsWith(inputs.os,'ubuntu-') && (inputs.gcc != '')}}
      run: sudo apt update
      shell: bash
    - if: ${{ startsWith(inputs.os,'ubuntu-') && (inputs.gcc != '')}}
      run: sudo apt-get install -y make ninja-build ${{ inputs.gcc }} $(echo ${{ inputs.gcc }} | sed -e 's/gcc/g\+\+/') libxml2-utils
      shell: bash

    # ------------------------------ Windows ------------------------------
    - if: ${{ startsWith(inputs.os,'windows-') }}
      uses: msys2/setup-msys2@07aeda7763550b267746a772dcea5e5ac3340b36
      with:
        install: gcc make
        cache: true

    # ------------------------------ MacOs ------------------------------
    - if: ${{ startsWith(inputs.os,'macos-') }}
      run: HOMEBREW_NO_AUTO_UPDATE=1 brew update
      shell: bash
    - if: ${{ startsWith(inputs.os,'macos-') }}
      run: HOMEBREW_NO_AUTO_UPDATE=1 brew install libxml2
      shell: bash

    # ------------------------------ Python, all OS ------------------------------
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
    - name: Restore pip cache
      uses: re-actors/cache-python-deps@250500eea3c0986666ae8bbeba9b23f69ae6a7d3
      with:
        cache-key-for-dependency-files: ${{ hashFiles('noxfile.py', 'pyproject.toml', 'doc/requirements.txt') }}
    - run: python3 -m pip install --upgrade pip
      shell: bash
    - run: python3 -m pip install nox requests
      shell: bash
